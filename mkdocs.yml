site_name: WickdHub
site_url: https://wickdhub.com
site_description: Outlines, trackers, research docs & user summaries — all in one place.

theme:
  name: material
  logo: assets/images/helmet.png
  favicon: assets/images/helmet.png
  palette:
    - scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: Fira Code
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/custom.css

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Outlines:
    - Overview: outlines/index.md
  - Trackers:
    - Overview: trackers/index.md
    - Track 2 Weekly: trackers/track2-weekly.md
    - Track 1 Weekly: trackers/track1-weekly.md
    - MCTE 6-Week Plan: trackers/mcte-6week-plan.md
    - Content:
      - Overview: trackers/content/index.md
      - Track 1 Content - Intro to PrePass: trackers/content/track1-content-intro-prepass.md
      - inForm Safety Storyboard: trackers/content/inform-safety-storyboard.md
      - inForm Safety Capture Guide: trackers/content/inform-safety-capture-guide.md
      - M1 Mission Vision Values: trackers/content/mission-vision-values-storyboard.md
      - M3 PrePass History: trackers/content/prepass-history-storyboard.md
      - M4 PrePass Alliance: trackers/content/prepass-alliance-storyboard.md
      - M5 Customers Market Product: trackers/content/customers-market-product-storyboard.md
      - M6 Revenue Model: trackers/content/revenue-model-storyboard.md
      - M7 Market Goals: trackers/content/market-goals-storyboard.md
  - Research:
    - Overview: research/index.md
    - Domain & Hosting Research: research/domain-hosting-research.md
  - Summaries:
    - Overview: summaries/index.md
    - April 7 Meeting Prep: summaries/apr7-meeting-prep.md
    - April 7 Kelsey Quick Ref: summaries/apr7-kelsey-quickref.md
    - April 7 Patty Follow-Up: summaries/apr7-patty-followup.md
    - inForm Safety Source Summary: summaries/inform-source-summary.md
  - Personal:
    - Overview: personal/index.md
    - Personal Tracker: personal/personal-tracker.md
    - Pop!_OS Install: personal/popos-install.md
