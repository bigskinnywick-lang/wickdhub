site_name: WickdHub
site_url: https://wickdhub.com
site_description: Outlines, trackers, research docs & user summaries — all in one place.

theme:
  name: material
  logo: assets/images/helmet.png
  favicon: assets/images/helmet.png
  palette:
    - scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: Fira Code
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/custom.css

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Outlines:
    - Overview: outlines/index.md
  - Trackers:
    - Overview: trackers/index.md
    - Track 2 Weekly: trackers/track2-weekly.md
    - Track 1 Weekly: trackers/track1-weekly.md
    - MCTE 6-Week Plan: trackers/mcte-6week-plan.md
    - PrePass Content: trackers/intro-prepass-content.md
    - Content:
      - Overview: trackers/content/index.md
      - Account Closure Storyboard: trackers/content/account-closure-storyboard.md
      - Verification Storyboard: trackers/content/verification-storyboard.md
      - inForm Safety Storyboard: trackers/content/inform-safety-storyboard.md
      - AA End-of-Call Storyboard: trackers/content/aa-endofcall-storyboard.md
      - AA End-of-Call Capture Guide: trackers/content/aa-endofcall-capture-guide.md
      - inForm Safety Capture Guide: trackers/content/inform-safety-capture-guide.md
  - Research:
    - Overview: research/index.md
    - Domain & Hosting Research: research/domain-hosting-research.md
  - Summaries:
    - Overview: summaries/index.md
    - inForm Safety Source Summary: summaries/inform-source-summary.md
